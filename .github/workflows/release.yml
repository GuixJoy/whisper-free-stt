name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: "--target x86_64-pc-windows-msvc"
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-13
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install frontend dependencies
        working-directory: stt-ui
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: stt-ui/src-tauri

      - name: Setup Python (for sidecar build)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5"

      - name: Build sidecar
        working-directory: stt-ui
        run: bash scripts/build-sidecar.sh
        if: matrix.platform == 'ubuntu-22.04'

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: stt-ui
          releaseId: ${{ github.event.release.id }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: floure-${{ matrix.platform }}
          path: |
            stt-ui/src-tauri/target/release/bundle/**/*.dmg
            stt-ui/src-tauri/target/release/bundle/**/*.exe
            stt-ui/src-tauri/target/release/bundle/**/*.AppImage
            stt-ui/src-tauri/target/release/bundle/**/*.deb
            stt-ui/src-tauri/target/release/bundle/**/*.rpm
          if-no-files-found: warn

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
